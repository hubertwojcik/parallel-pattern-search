name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: install openmpi
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: build
        run: |
          go build ./cmd/aho_seq
          go build ./cmd/aho_goroutines
          CGO_CFLAGS="-I/usr/include/mpi" go build ./cmd/aho_mpi

  scripts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: test generators
        run: python -m unittest discover -s scripts -p "test_*.py"

      - name: gen_text smoke test
        run: python scripts/gen_text.py --size 1kb --out /tmp/text.txt

      - name: gen_patterns smoke test
        run: python scripts/gen_patterns.py --count 10 --out /tmp/patterns.txt

  scripts-extended:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: gen_text 10MB
        run: python scripts/gen_text.py --size 10mb --out /tmp/text_10mb.txt

      - name: gen_patterns 1000
        run: python scripts/gen_patterns.py --count 1000 --out /tmp/patterns_1000.txt

      - uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: |
            /tmp/text_10mb.txt
            /tmp/patterns_1000.txt
